<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astra Workspace</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- GridStack CSS -->
    <link href="https://cdn.jsdelivr.net/npm/gridstack@10.0.1/dist/gridstack.min.css" rel="stylesheet" />
    <style>
        :root {
            /* Premium Dark Theme Palette */
            --bg-base: #0f1115;
            --bg-surface: rgba(26, 29, 36, 0.7);
            --bg-surface-solid: #1a1d24;
            --bg-chat: rgba(20, 23, 28, 0.85);

            --brand-primary: #3b82f6;
            --brand-primary-hover: #2563eb;
            --brand-glow: rgba(59, 130, 246, 0.5);

            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;

            --border-light: rgba(255, 255, 255, 0.08);
            --border-focus: rgba(59, 130, 246, 0.5);

            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            /* Subtle radial gradient background */
            background-image: radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.08), transparent 25%);
            color: var(--text-primary);
            overflow: hidden;
        }

        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            backdrop-filter: blur(10px);
        }

        /* ----- Left Panel - Workspace Area ----- */
        .workspace-panel {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .workspace-header {
            margin-bottom: 24px;
            display: flex;
            align-items: center;
        }

        .workspace-header h2 {
            margin: 0;
            font-weight: 600;
            font-size: 1.5rem;
            background: linear-gradient(90deg, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .grid-stack {
            flex: 1;
            /* Remove background from grid itself, let items float */
            border-radius: 16px;
            min-height: calc(100vh - 120px);
        }

        /* Custom GridStack Handle Logic */
        .grid-stack-item-content {
            background: var(--bg-surface) !important;
            backdrop-filter: blur(12px) !important;
            border: 1px solid var(--border-light) !important;
            box-shadow: var(--glass-shadow) !important;
            border-radius: 16px !important;
            padding: 0 !important;
            overflow: hidden !important;
            /* GridStack natively sets position:absolute + inset:0 here.
               DO NOT override with position:relative — that kills the height chain! */
        }

        /* Hover drag handle in top left */
        .drag-handle {
            position: absolute;
            top: 10px;
            left: 10px;
            cursor: grab;
            color: var(--text-muted);
            background: rgba(0, 0, 0, 0.4);
            border-radius: 4px;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-size: 14px;
            opacity: 0;
            z-index: 100;
        }

        .grid-stack-item-content:hover .drag-handle {
            opacity: 1;
        }

        .drag-handle:active {
            cursor: grabbing;
            background: var(--brand-primary);
            color: #fff;
        }

        /* Hover close button in top right */
        .widget-close {
            position: absolute;
            top: 10px;
            right: 10px;
            cursor: pointer;
            color: var(--text-muted);
            background: rgba(0, 0, 0, 0.4);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-size: 14px;
            opacity: 0;
            z-index: 100;
        }

        .grid-stack-item-content:hover .widget-close {
            opacity: 1;
        }

        .widget-close:hover {
            color: #ef4444;
            background: rgba(255, 255, 255, 0.1);
        }

        /* Hide resize handle by default, show on hover */
        .grid-stack-item>.ui-resizable-se {
            opacity: 0 !important;
            transition: opacity 0.2s ease;
            z-index: 1000 !important;
        }

        .grid-stack-item:hover>.ui-resizable-se {
            opacity: 1 !important;
        }

        .widget-body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            color: var(--text-primary);
        }

        /* ----- Right Panel - Chat Area ----- */
        .chat-panel {
            width: 440px;
            background: var(--bg-chat);
            backdrop-filter: blur(20px);
            border-left: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.2);
            z-index: 10;
        }

        .chat-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
        }

        .chat-header h2 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-header h2::before {
            content: '';
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #10b981;
            box-shadow: 0 0 10px #10b981;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .message {
            max-width: 88%;
            padding: 14px 18px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 0.95rem;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--brand-primary), #6366f1);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .message.assistant {
            align-self: flex-start;
            background-color: var(--bg-surface-solid);
            border: 1px solid var(--border-light);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
        }

        .message.system {
            align-self: center;
            background-color: transparent;
            color: var(--text-muted);
            font-size: 0.8rem;
            font-style: italic;
            border: 1px dashed var(--border-light);
            border-radius: 8px;
            padding: 8px 16px;
        }

        .chat-input-area {
            padding: 20px 24px;
            border-top: 1px solid var(--border-light);
            background: rgba(0, 0, 0, 0.1);
        }

        .input-group {
            display: flex;
            gap: 12px;
            background: var(--bg-surface-solid);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 6px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .input-group:focus-within {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }

        input[type="text"] {
            flex: 1;
            padding: 10px 14px;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
        }

        input[type="text"]::placeholder {
            color: var(--text-muted);
        }

        button.send-btn {
            background-color: var(--brand-primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0 20px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button.send-btn:hover:not(:disabled) {
            background-color: var(--brand-primary-hover);
            box-shadow: 0 0 15px var(--brand-glow);
        }

        button.send-btn:disabled {
            background-color: #334155;
            color: #94a3b8;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            padding: 12px 18px;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            background-color: transparent;
            color: var(--text-secondary);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot-pulse {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--text-secondary);
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot-pulse:nth-child(1) {
            animation-delay: -0.32s;
        }

        .dot-pulse:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
                opacity: 0.3;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div class="app-container">
        <!-- Left Panel: Workspace (GenUI Grid) -->
        <main class="workspace-panel">
            <div class="workspace-header">
                <h2>ASTRA</h2>
            </div>
            <div class="grid-stack">
                <!-- Widgets will be dynamically injected here -->
            </div>
        </main>

        <!-- Right Panel: Chat Interface -->
        <aside class="chat-panel">
            <header class="chat-header">
                <h2>Astra Assistant</h2>
            </header>

            <div class="chat-messages" id="chat-messages">
                <div class="message assistant">
                    Hello! I am an advanced AI assistant. I can provide text-based responses or create visual widgets in
                    the workspace on the left. What would you like to do?
                </div>
            </div>

            <div class="typing-indicator" id="typing-indicator">
                Astra is thinking...
            </div>

            <div class="chat-input-area">
                <form id="chat-form" class="input-group">
                    <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off" required>
                    <button type="submit" class="send-btn" id="send-btn">Send</button>
                </form>
            </div>
        </aside>
    </div>

    <!-- GridStack JS -->
    <script src="https://cdn.jsdelivr.net/npm/gridstack@10.0.1/dist/gridstack-all.js"></script>
    <script src="/static/app.js"></script>
</body>

</html>
