<!DOCTYPE html>
<html>
<head>
<style>
  body {
    margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #0f1115; color: #94a3b8; font-family: system-ui, sans-serif;
    flex-direction: column; gap: 16px;
  }
  .spinner { width: 32px; height: 32px; border: 3px solid #1e293b; border-top-color: #3b82f6;
    border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  h2 { margin: 0; font-size: 1.2rem; font-weight: 500; color: #f8fafc; }
  p { margin: 0; font-size: 0.85rem; }
</style>
</head>
<body>
  <div class="spinner"></div>
  <h2>Astra</h2>
  <p>Starting Docker container...</p>
</body>
</html>
